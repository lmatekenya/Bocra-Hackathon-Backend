version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: bocra_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bocra_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: bocra_backend
    depends_on:
      - postgres
    environment:
      PORT: 8083
      JDBC_DATABASE_URL: jdbc:postgresql://postgres:5432/bocra_db
      JDBC_DATABASE_USERNAME: postgres
      JDBC_DATABASE_PASSWORD: postgres
      APP_JWT_SECRET: replace-this-with-a-long-secret
      APP_CORS_ALLOWED_ORIGINS: http://localhost:3000
      APP_ADMIN_BOOTSTRAP_USERNAME: admin
      APP_ADMIN_BOOTSTRAP_PASSWORD: Admin@12345
    ports:
      - "8083:8083"

volumes:
  pg_data:
