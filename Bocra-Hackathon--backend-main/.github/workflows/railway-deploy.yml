name: Backend Railway Deploy

on:
  push:
    branches: ["main"]
    paths:
      - "src/**"
      - "pom.xml"
      - "Dockerfile"
      - "docker-compose.yml"
      - ".github/workflows/railway-deploy.yml"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "maven"

      - name: Build Backend
        run: ./mvnw -DskipTests package

      - name: Build Docker Image
        run: docker build -t bocra-backend:${{ github.sha }} .

      - name: Trigger Railway Deploy Hook
        if: ${{ secrets.RAILWAY_DEPLOY_HOOK_URL != '' }}
        env:
          RAILWAY_DEPLOY_HOOK_URL: ${{ secrets.RAILWAY_DEPLOY_HOOK_URL }}
        run: curl -fsSL -X POST "$RAILWAY_DEPLOY_HOOK_URL"

      - name: Reminder if no deploy hook is configured
        if: ${{ secrets.RAILWAY_DEPLOY_HOOK_URL == '' }}
        run: echo "RAILWAY_DEPLOY_HOOK_URL is not set. Build completed, but Railway deploy was skipped."
